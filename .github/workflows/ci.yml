name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy (strict)
        run: uv run mypy
      - name: Security boundary tests
        run: uv run pytest tests/security -m security
      - name: Full test suite (no live services)
        run: uv run pytest
