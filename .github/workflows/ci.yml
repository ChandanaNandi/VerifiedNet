name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy (strict)
        run: uv run mypy
      - name: Security boundary tests
        run: uv run pytest tests/security -m security
      - name: Full test suite (no live services)
        # The integration tier boots real Docker labs and requires Engine >= 28.1
        # (compose interface_name; ADR 0015). It is local-first and explicitly
        # NOT a required check — excluded here by marker.
        run: uv run pytest -m "not integration"
